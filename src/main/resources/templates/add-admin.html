<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" th:href="@{/css/admin-layout.css}" />

<style>

/* Full height center layout */
.center-wrapper{
    min-height: 90vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Card design */
.admin-card{
    width: 100%;
    max-width: 480px;
    border-radius: 16px;
    overflow:hidden;
    border:none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Header gradient */
.card-header-custom{
    background: linear-gradient(135deg,#007bff,#00c6ff);
    color:white;
    text-align:center;
    padding:25px;
}

/* Inputs */
.form-control{
    border-radius: 10px;
    padding:10px 14px;
}

.form-control:focus{
    box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
}

/* Button */
.btn-save{
    border-radius: 10px;
    padding:10px;
    font-weight:600;
    transition:0.3s;
}

.btn-save:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></div>

<!-- Main Content -->
<div class="content">

    <div class="container-fluid center-wrapper">

        <div class="card admin-card">

            <!-- Header -->
            <div class="card-header-custom">
                <h4 class="mb-1">
                    <i class="bi bi-person-plus-fill"></i>
                    Add New Admin
                </h4>
                <small>Create another administrator account</small>
            </div>

            <!-- Success / Error messages -->
            <div th:replace="~{fragments/SuccessandError :: SuccessandError}"></div>

            <!-- Body -->
            <div class="card-body p-4">

                <form th:action="@{/saveAdmin}" th:object="${admin}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-save w-100">
                        <i class="bi bi-save"></i> Save Admin
                    </button>

                </form>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
